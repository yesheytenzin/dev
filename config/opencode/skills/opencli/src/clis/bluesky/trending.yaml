site: bluesky
name: trending
description: Trending topics on Bluesky
domain: public.api.bsky.app
strategy: public
browser: false

args:
  limit:
    type: int
    default: 20
    description: Number of topics

pipeline:
  - fetch:
      url: https://public.api.bsky.app/xrpc/app.bsky.unspecced.getTrendingTopics

  - select: topics

  - map:
      rank: ${{ index + 1 }}
      topic: ${{ item.topic }}
      link: ${{ item.link }}

  - limit: ${{ args.limit }}

columns: [rank, topic, link]
